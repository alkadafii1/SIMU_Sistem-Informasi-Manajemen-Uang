[build]
  command = "npm run build"  # jika ada build script, misal untuk frontend
  publish = "dist"  # folder hasil build Vite

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200